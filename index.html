
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Bionova Consultoría</title>
<style>
body{font-family:Arial,Helvetica,sans-serif;margin:0;background:#0f172a;color:white}
header{padding:80px 20px;text-align:center;background:linear-gradient(120deg,#0f172a,#1e293b)}
h1{font-size:48px;margin-bottom:10px}
p{max-width:700px;margin:auto;font-size:18px;opacity:.9}

.section{padding:80px 20px;text-align:center;background:white;color:#111}
.section h2{font-size:34px;margin-bottom:40px}

.logos{display:flex;justify-content:center;align-items:center;gap:60px;flex-wrap:wrap}
.logos img{height:70px;opacity:.8;transition:.3s}
.logos img:hover{opacity:1;transform:scale(1.05)}

.cta{margin-top:50px}
.btn{background:#2563eb;color:white;padding:14px 28px;border-radius:8px;text-decoration:none;font-weight:bold}
</style>
</head>

<body>

<header>
<h1>BIONOVA</h1>
<p>Consultoría y capacitación profesional para empresas del sector industrial, alimenticio y corporativo.</p>
<div class="cta">
<a class="btn" href="#">Solicitar Información</a>
</div>
</header>

<section class="section">
<h2>Empresas que han confiado en nosotros</h2>

<div class="logos">
<img src="assets/logos/tetrapak.png" alt="Tetra Pak">
<img src="assets/logos/nnproducts.png" alt="NN Products">
<img src="assets/logos/desu.png" alt="DESU Operadora">
</div>

</section>

</body>
</html>
