<title>Verificar certificado · BioNova</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#0b1530;--navy-2:#13284a;--blue:#2a6df6;--blue-soft:#69d2ff;--ink:#13284a;--ink-soft:#5b6b86;--line:#e7ecf4;--ok:#10b981;--bad:#ef4444}
body{font-family:'Plus Jakarta Sans',system-ui,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;color:#eaf2ff;background:#081225;background-image:radial-gradient(circle at 50% 6%,#102a52,#081225 60%)}
.card{width:100%;max-width:560px;background:#fff;color:var(--ink);border-radius:20px;overflow:hidden;box-shadow:0 30px 80px rgba(0,0,0,.5)}
.top{background:linear-gradient(135deg,var(--navy),var(--navy-2));padding:26px 28px;text-align:center;border-bottom:3px solid var(--blue)}
.top img{height:50px;width:auto;margin:0 auto 8px;display:block}
.top .sub{font-size:11px;letter-spacing:3px;color:var(--blue-soft);text-transform:uppercase;font-weight:700}
.body{padding:30px 28px 32px}
.state{display:flex;align-items:center;gap:14px;padding:16px 18px;border-radius:14px;margin-bottom:24px}
.state.ok{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.35)}
.state.bad{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.35)}
.state.load{background:#eef3fb;border:1px solid #dde6f4}
.state__ic{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#fff}
.state.ok .state__ic{background:var(--ok)}.state.bad .state__ic{background:var(--bad)}.state.load .state__ic{background:var(--blue)}
.state__ic svg{width:24px;height:24px}
.state__t{font-weight:800;font-size:17px;line-height:1.2}
.state.ok .state__t{color:var(--ok)}.state.bad .state__t{color:var(--bad)}
.state__d{font-size:12.5px;color:var(--ink-soft);margin-top:3px}
.rows{display:none}
.row{display:flex;justify-content:space-between;gap:16px;padding:13px 0;border-bottom:1px solid var(--line)}
.row:last-child{border-bottom:0}
.row .k{font-size:11px;font-weight:700;letter-spacing:1.4px;text-transform:uppercase;color:var(--ink-soft);flex-shrink:0;padding-top:2px}
.row .v{font-size:15px;font-weight:600;color:var(--navy-2);text-align:right}
.row .v.mono{font-family:'JetBrains Mono',monospace;letter-spacing:.5px}
.foot{margin-top:22px;text-align:center;font-size:11px;color:var(--ink-soft);line-height:1.6}
.foot a{color:var(--blue);font-weight:700;text-decoration:none}
.spin{animation:spin 1s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}
</style></head>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, query, where, getDocs, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
const app = initializeApp({apiKey:"AIzaSyDNZijSLGkbCM6-H_x_vT_OWDfucqplXYs",authDomain:"bionova-academy.firebaseapp.com",projectId:"bionova-academy",storageBucket:"bionova-academy.firebasestorage.app",messagingSenderId:"452419284431",appId:"1:452419284431:web:5b1f7ef567b9fe9582f6ba"});
const db = getFirestore(app);
const params = new URLSearchParams(location.search);
const folio = (params.get('folio') || params.get('f') || '').trim();
const $=id=>document.getElementById(id);
function setState(cls,svg,title,desc){const s=$('state');s.className='state '+cls;s.querySelector('.state__ic').innerHTML=svg;$('st-title').textContent=title;$('st-desc').textContent=desc;}
const OK='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><polyline points="20 6 9 17 4 12"/></svg>';
const BAD='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>';
function fmt(d){try{const dt=d&&d.toDate?d.toDate():new Date(d);return dt.toLocaleDateString('es-MX',{year:'numeric',month:'long',day:'numeric'});}catch(e){return d||'—';}}
(async()=>{
  if(!folio){setState('bad',BAD,'Folio no indicado','Abre el enlace con un folio válido, ej. ?folio=BIONOVA-2026-XXXXXX');return;}
  try{
    let data=null;
    try{const ds=await getDoc(doc(db,'certificados',folio));if(ds.exists())data=ds.data();}catch(e){}
    if(!data){const qs=await getDocs(query(collection(db,'certificados'),where('folio','==',folio)));if(!qs.empty)data=qs.docs[0].data();}
    if(!data){setState('bad',BAD,'Certificado no encontrado','El folio '+folio+' no existe en nuestros registros.');return;}
    setState('ok',OK,'Certificado auténtico','Este folio está registrado oficialmente por BioNova.');
    $('r-nombre').textContent=data.nombre||data.nombreMiembro||'—';
    $('r-curso').textContent=data.curso||data.tituloCurso||'—';
    $('r-area').textContent=data.area||'—';
    $('r-horas').textContent=(data.sesiones?data.sesiones+' sesiones · ':'')+(data.horas?data.horas+' horas':'—');
    $('r-fecha').textContent=fmt(data.emitido||data.fechaEmision||data.createdAt);
    $('r-folio').textContent=data.folio||folio;
    $('rows').style.display='block';
  }catch(e){console.error(e);setState('bad',BAD,'Error de verificación','No se pudo consultar el folio. Intenta de nuevo más tarde.');}
})();
</script>
